# ──────────────────────────────────────────────────────────────
# Quarto Publish to GitHub Pages
#
# Strategy: LOCAL execution with CI rendering
#   1. You run `quarto render` locally (where Julia/MATLAB live)
#   2. Commit the _freeze/ directory
#   3. Push to main → GitHub Actions renders markdown only
#      (no Julia/MATLAB needed on the CI server)
# ──────────────────────────────────────────────────────────────

on:
  workflow_dispatch:
  push:
    branches: main

name: Quarto Publish

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Render and Publish
        uses: quarto-dev/quarto-actions/publish@v2
        with:
          target: gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
